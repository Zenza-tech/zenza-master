<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zenza FID — Sign In</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1420">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<style>
  body{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .login-card{ width:100%; max-width:380px; border:1px solid var(--line-strong); background:var(--panel); padding:36px 32px; border-radius:var(--radius); }
  .login-mark{ display:flex; align-items:center; gap:9px; justify-content:center; margin-bottom:22px; }
  .login-mark .dot{ width:9px; height:9px; background:var(--teal); border-radius:50%; box-shadow:0 0 12px var(--teal); }
  .login-mark span{ font-family:'Space Grotesk'; font-weight:700; font-size:17px; color:var(--heading); letter-spacing:0.02em; }
  .login-card h1{ font-size:19px; text-align:center; margin-bottom:6px; }
  .login-card p.sub{ text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:26px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-family:'IBM Plex Mono'; font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-dim); margin-bottom:7px; }
  .field input{ width:100%; background:var(--bg); border:1px solid var(--line-strong); color:var(--text); padding:11px 13px; border-radius:var(--radius); font-family:'IBM Plex Sans'; font-size:14px; outline:none; }
  .field input:focus{ border-color:var(--teal); }
  .login-error{ background:color-mix(in srgb, var(--red) 12%, transparent); border:1px solid color-mix(in srgb, var(--red) 40%, transparent); color:var(--red-ink); font-size:13px; padding:10px 12px; border-radius:var(--radius); margin-bottom:16px; display:none; }
  .login-error.show{ display:block; }
  .login-card .btn-primary{ width:100%; justify-content:center; margin-top:6px; }
  .login-toggle{ display:flex; justify-content:center; margin-top:22px; }
  .default-note{ margin-top:20px; font-size:11.5px; color:var(--text-dim); text-align:center; line-height:1.6; }
  .default-note code{ font-family:'IBM Plex Mono'; color:var(--teal-ink); }
</style>
</head>
<body>
  <div class="login-card">
    <div class="login-mark"><img src="icons/zenzatech-icon-transparent-teal.svg" alt="" style="height:20px; width:20px;"><span>ZENZA FID</span></div>
    <h1>Sign in to the console</h1>
    <p class="sub">Fraud Intelligence Platform</p>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" placeholder="you@zenzafid.local">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <div class="login-toggle">
      <div class="theme-toggle">
        <button data-mode="light">Light</button>
        <button data-mode="dark">Dark</button>
        <button data-mode="system">Auto</button>
      </div>
    </div>

    <p class="default-note">First run? Default admin: <code>admin@zenzafid.local</code> — check your terminal for the generated password, and change it immediately after signing in.</p>
    <p class="default-note" style="margin-top:10px;"><a href="https://zenza-master.onrender.com" style="color:var(--teal-ink); text-decoration:none;">← Back to Zenza Technology</a></p>
  </div>

<script src="assets/site.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errBox = document.getElementById('loginError');
    errBox.classList.remove('show');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!data.ok) {
        errBox.textContent = data.error || 'Sign in failed';
        errBox.classList.add('show');
        return;
      }
      window.location.href = '/console.html';
    } catch (err) {
      errBox.textContent = 'Could not reach the server. Is it running?';
      errBox.classList.add('show');
    }
  });
</script>
</body>
</html>
