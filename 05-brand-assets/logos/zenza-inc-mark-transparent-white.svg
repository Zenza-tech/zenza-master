<svg xmlns="http://www.w3.org/2000/svg" width="520" height="460" viewBox="0 0 520 460">
  <defs>
    <linearGradient id="reflectFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="reflectMask">
      <rect x="0" y="230" width="520" height="60" fill="url(#reflectFade)"/>
    </mask>
  </defs>

  

  <!-- dashed circle -->
  <circle cx="260.0" cy="230" r="118" fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-dasharray="6,7"/>

  <!-- reflected/mirrored wordmark (fading, behind main wordmark) -->
  <g mask="url(#reflectMask)">
    <g transform="translate(260.0,238) scale(1,-1) translate(-260.0,-238)">
      <text x="260.0" y="238" text-anchor="middle" font-family="Space Grotesk" font-weight="700"
            font-size="27" letter-spacing="1.5" fill="#FFFFFF">ZENZA INC.</text>
    </g>
  </g>

  <!-- main wordmark -->
  <text x="260.0" y="230" text-anchor="middle" font-family="Space Grotesk" font-weight="700"
        font-size="27" letter-spacing="1.5" fill="#FFFFFF">ZENZA INC.</text>

  <!-- underline -->
  <line x1="176.3" y1="244" x2="343.7" y2="244" stroke="#FFFFFF" stroke-width="1.6"/>

  <!-- subline (EST 2022 / A ZENZA INC. COMPANY) -->
  <text x="260.0" y="410" text-anchor="middle" font-family="Space Grotesk" font-weight="700"
        font-size="19" letter-spacing="1.2" fill="#FFFFFF">EST 2022</text>

  
</svg>